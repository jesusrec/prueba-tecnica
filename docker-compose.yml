version: '3.8'

services:
  db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_tech -d tech_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: tech_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    networks:
      - backend_net
    volumes:
      - tech_db_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  backend:
    build: ./backend
    image: prueba-tecnica-backend:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: tech_db
      DB_USER: postgres
      DB_PASSWORD: admin
    networks:
      - backend_net
      - frontend_net
    deploy:
      replicas: 2 # REQUISITO: Uso adecuado de replicas
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  frontend:
    build: ./frontend
    image: prueba-tecnica-frontend:latest
    ports:
      - "80:80"
    networks:
      - frontend_net
    deploy:
      replicas: 2 # REQUISITO: Alta disponibilidad
      restart_policy:
        condition: on-failure

networks:
  backend_net:
    driver: overlay # Requerido para Swarm
  frontend_net:
    driver: overlay # Requerido para Swarm

volumes:
  tech_db_data: # Persistencia de base de datos